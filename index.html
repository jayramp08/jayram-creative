<!DOCTYPE html>
<html>
<head>
<title>Jayram Creative</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  animation: bgChange 10s infinite alternate;
}

/* Background animation */
@keyframes bgChange {
  0% { background: #1e3c72; }
  50% { background: #2a5298; }
  100% { background: #ff512f; }
}

header {
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.container {
  margin-top: 50px;
}

/* Grid layout */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.15);
  padding: 30px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.3);
}

h2 {
  margin-bottom: 20px;
}

</style>
</head>

<body>

<header>Jayram Creative 🚀</header>

<div class="container">
  <h2>Welcome! Choose an Option</h2>

  <div class="grid">

    <div class="card" onclick="login()">
      🔐<br><br>Login
    </div>

    <div class="card" onclick="signup()">
      📝<br><br>Sign Up
    </div>

    <div class="card" onclick="startTest()">
      📘<br><br>Mock Test
    </div>

    <div class="card" onclick="timetable()">
      ⏰<br><br>Time Table
    </div>

  </div>
</div>

<script>

function login(){
  alert("Login page coming soon 😎");
}

function signup(){
  alert("Signup page coming soon 😎");
}

function startTest(){
  window.location.href = "test.html";
}

function timetable(){
  alert("Timetable feature coming soon 😎");
}

</script>

</body>
</html>
