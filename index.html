<!DOCTYPE html>
<html>
<head>
<title>Jayram Creative</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  height: 100vh;
  background: linear-gradient(-45deg, #000000, #1e1e1e, #2c2c2c);
  background-size: 400% 400%;
  animation: bg 10s infinite alternate;
  color: white;
  text-align: center;
}

/* Background animation */
@keyframes bg {
  0% { background-position: 0% }
  100% { background-position: 100% }
}

/* Logo */
.logo {
  margin-top: 60px;
}

.logo img {
  width: 140px;
  border-radius: 50%;
  box-shadow: 0 0 25px red;
}

/* Title */
.title {
  font-size: 32px;
  font-weight: bold;
  margin-top: 15px;
  letter-spacing: 2px;
}

/* Line */
.line {
  width: 180px;
  height: 3px;
  margin: 10px auto 30px;
  background: linear-gradient(90deg, red, white);
  border-radius: 5px;
}

/* Buttons */
.top {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 30px;
}

.btn {
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, red, #ff4d4d);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px red;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  width: 90%;
  max-width: 600px;
  margin: auto;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.4s;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-8px) scale(1.05);
  box-shadow: 0 0 20px red;
}

</style>
</head>

<body>

<!-- Logo -->
<div class="logo">
  <img src="logo.png" alt="logo">
</div>

<div class="title">JAYRAM CREATIVE</div>
<div class="line"></div>

<!-- Login Signup -->
<div class="top">
  <button class="btn" onclick="login()">Login</button>
  <button class="btn" onclick="signup()">Sign Up</button>
</div>

<!-- Cards -->
<div class="grid">

  <div class="card" onclick="mock()">📘<br><br>Mock Test</div>

  <div class="card" onclick="schedule()">⏰<br><br>Schedule</div>

  <div class="card" onclick="feedback()">💬<br><br>Feedback</div>

  <div class="card" onclick="youtube()">▶️<br><br>Subscribe</div>

</div>

<script>
function login(){
  alert("Login coming soon 😎");
}

function signup(){
  alert("Signup coming soon 😎");
}

function mock(){
  window.location.href = "test.html";
}

function schedule(){
  alert("Schedule coming soon 😎");
}

function feedback(){
  alert("Feedback coming soon 😎");
}

function youtube(){
  window.open("https://youtube.com/@jayramcreative?si=XEirQcwwhRT3vdG_");
}
</script>

</body>
</html>
