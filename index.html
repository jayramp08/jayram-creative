<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayram Creative</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  height: 100vh;
  background: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: start;
  color: white;
}

/* Big Square */
.big-box {
  margin-top: 30px;
  width: 85%;
  height: 200px;
  border-radius: 20px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Rainbow border */
.big-box::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 3px;
  border-radius: 20px;
  background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 300%;
  animation: rotate 5s linear infinite;
  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
}

/* Animation */
@keyframes rotate {
  0% { background-position: 0% }
  100% { background-position: 300% }
}

/* Inner box */
.inner {
  width: 100%;
  height: 100%;
  background: #111;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Title */
.title {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* Buttons */
.btns {
  margin-top: 25px;
  display: flex;
  gap: 15px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #ff3b3b;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* Small Cards */
.small-box {
  margin-top: 30px;
  width: 85%;
  height: 120px;
  border-radius: 15px;
  position: relative;
}

/* Rainbow border for small */
.small-box::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 3px;
  border-radius: 15px;
  background: linear-gradient(45deg, red, yellow, cyan, blue);
  background-size: 300%;
  animation: rotate 5s linear infinite;
  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
}

.small-inner {
  width: 100%;
  height: 100%;
  background: #111;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- BIG BOX -->
<div class="big-box">
  <div class="inner">
    <div class="title">JAYRAM CREATIVE</div>
  </div>
</div>

<!-- LOGIN SIGNUP -->
<div class="btns">
  <button class="btn" onclick="login()">Login</button>
  <button class="btn" onclick="signup()">Sign Up</button>
</div>

<!-- MOCK TEST -->
<div class="small-box" onclick="mock()">
  <div class="small-inner">Mock Test</div>
</div>

<!-- SUBSCRIBE -->
<div class="small-box" onclick="youtube()">
  <div class="small-inner">Subscribe Channel</div>
</div>

<script>
function login(){
  alert("Login coming soon 😎");
}

function signup(){
  alert("Signup coming soon 😎");
}

function mock(){
  window.location.href = "test.html";
}

function youtube(){
  window.open("https://youtube.com/@jayramcreative?si=XEirQcwwhRT3vdG_");
}
</script>

</body>
</html>
