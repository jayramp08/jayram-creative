<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayram Creative</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: black;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 40px;
  gap: 10px;
}

/* Logo */
.logo {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

/* Title */
.title {
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* Buttons */
.btns {
  margin-top: 20px;
}

.btn {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #ff3b3b;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* Card */
.box {
  margin: 25px auto;
  width: 85%;
  height: 120px;
  border-radius: 15px;
  position: relative;
}

/* Rainbow border */
.box::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 3px;
  border-radius: 15px;
  background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 300%;
  animation: rotate 5s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
}

/* Inner */
.inner {
  width: 100%;
  height: 100%;
  background: #111;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
}

/* Animation */
@keyframes rotate {
  0% { background-position: 0% }
  100% { background-position: 300% }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <div class="title">JAYRAM CREATIVE</div>
</div>

<!-- LOGIN SIGNUP -->
<div class="btns">
  <button class="btn" onclick="login()">Login</button>
  <button class="btn" onclick="signup()">Sign Up</button>
</div>

<!-- MOCK TEST -->
<div class="box" onclick="mock()">
  <div class="inner">Mock Test</div>
</div>

<!-- SUBSCRIBE -->
<div class="box" onclick="youtube()">
  <div class="inner">Subscribe Channel</div>
</div>

<script>
function login(){
  window.location.href = "login.html";
}

function signup(){
  window.location.href = "signup.html";
}
function mock(){
  window.location.href = "test.html";
}

function youtube(){
  window.open("https://youtube.com/@jayramcreative?si=XEirQcwwhRT3vdG_");
}
</script>

</body>
</html>
